services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - PORT=8080
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
